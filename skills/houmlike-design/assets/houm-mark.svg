<?xml version="1.0" encoding="UTF-8"?>
<!--
  Houm brand mark — framed wordmark.

  Renders the canonical "Houm&#174;" wordmark inside the thin-stroke rectangular
  frame from the 2019 brand book. Stroke and text use `currentColor` so the
  mark theme-shifts via CSS `color`. Default color is Houm Green #3D7E48.

  The Sanchez (Latin subset) font is embedded as base64 woff2 so the mark
  renders identically when loaded via <img>, <object>, or inline.
  Source: Google Fonts, OFL 1.1 (https://fonts.google.com/specimen/Sanchez).
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 200 96"
     role="img"
     aria-label="Houm"
     color="#3D7E48"
     fill="none">
  <title>Houm</title>
  <defs>
    <style type="text/css">
      @font-face {
        font-family: 'HoumSanchez';
        font-style: normal;
        font-weight: 400;
        src: url('data:font/woff2;base64,') format('woff2');
      }
      .houm-word { font-family: 'HoumSanchez', 'Sanchez', 'Roboto Slab', Georgia, serif; }
    </style>
  </defs>

  <!-- Frame: thin-stroke rectangle with small corner ticks ("feet") -->
  <g stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none">
    <rect x="14" y="14" width="172" height="68" rx="1.5" ry="1.5" />
    <line x1="8"   y1="14" x2="20"  y2="14" />
    <line x1="180" y1="14" x2="192" y2="14" />
    <line x1="8"   y1="82" x2="20"  y2="82" />
    <line x1="180" y1="82" x2="192" y2="82" />
  </g>

  <!-- Wordmark -->
  <text x="100" y="65"
        class="houm-word"
        text-anchor="middle"
        fill="currentColor"
        stroke="none"
        font-size="54"
        font-weight="400"
        letter-spacing="0.3">Houm</text>

  <!-- Registered mark -->
  <text x="172" y="32"
        class="houm-word"
        text-anchor="middle"
        fill="currentColor"
        stroke="none"
        font-size="9">&#174;</text>
</svg>
